name: Pipeline

# IDEAL pipeline as a single DAG:
#   ci → deploy_test → e2e (4 shards) → tag_test_passed → promote_staging
#     → mark_staging_passed
#
# Tags (test-passed/<sha>, staging-passed/<sha>) are still created for audit
# + so promote-prod.yml's cron has something to read. The chain itself is
# job-to-job (`needs:`) — no cross-workflow tag-trigger plumbing, no PAT.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - run: pnpm install --frozen-lockfile

      - name: Validate version.json
        run: node -e "JSON.parse(require('fs').readFileSync('app/version.json','utf8'))"

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke test
        run: pnpm test:smoke

  deploy_test:
    needs: ci
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy
        env:
          GITHUB_SHA: ${{ steps.sha.outputs.short }}
        run: |
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          deploy/deploy.sh test

  e2e:
    needs: deploy_test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      - name: E2E shard ${{ matrix.shard }}/4
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/4

  tag_test_passed:
    needs: [deploy_test, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag test-passed
        env:
          SHA: ${{ needs.deploy_test.outputs.sha }}
        run: |
          TAG="test-passed/$SHA"
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged $TAG"

  promote_staging:
    needs: [deploy_test, tag_test_passed]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy staging
        env:
          GITHUB_SHA: ${{ needs.deploy_test.outputs.sha }}
        run: |
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          deploy/deploy.sh staging

  mark_staging_passed:
    needs: [deploy_test, promote_staging]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag staging-passed
        env:
          SHA: ${{ needs.deploy_test.outputs.sha }}
        run: |
          TAG="staging-passed/$SHA"
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          git tag "$TAG"
          git push origin "$TAG"
          echo "Marked $TAG"
