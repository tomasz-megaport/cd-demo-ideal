name: Pipeline

# IDEAL pipeline as a single DAG so one GH Actions run page shows the
# whole graph: ci → deploy_preprod → e2e (4 shards) → tag_preprod_passed.
#
# After this point, the `promote-sandbox-prod` workflow takes over — its
# 8h cron picks the newest `pre-prod-passed/<sha>` tag and deploys it to
# sandbox + prod in parallel.
#
# Tags still emitted (`pre-prod-passed/<sha>`) so external systems
# (Sentry releases, audit logs, monitoring) can subscribe to the same
# artifact identifier — they outlive 90-day workflow run retention.
# Within this single workflow, jobs use `needs:` not tag-triggers,
# so no PAT is required.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - run: pnpm install --frozen-lockfile

      - name: Validate version.json
        run: node -e "JSON.parse(require('fs').readFileSync('app/version.json','utf8'))"

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke test
        run: pnpm test:smoke

  deploy_preprod:
    needs: ci
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy
        env:
          GITHUB_SHA: ${{ steps.sha.outputs.short }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          deploy/deploy.sh pre-prod

  e2e:
    needs: deploy_preprod
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      - name: E2E shard ${{ matrix.shard }}/4
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/4

  tag_preprod_passed:
    needs: [deploy_preprod, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag pre-prod-passed
        env:
          SHA: ${{ needs.deploy_preprod.outputs.sha }}
        run: |
          TAG="pre-prod-passed/$SHA"
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged $TAG — eligible for sandbox+prod cron promotion"
