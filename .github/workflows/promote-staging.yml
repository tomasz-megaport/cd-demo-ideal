name: Promote to staging

# IDEAL CHANGE vs MVP:
# Promotion to staging only happens after a `test-passed/<sha>` tag exists.
# Soak window before promote-prod takes the same artifact further.

on:
  push:
    tags: ['test-passed/*']

concurrency:
  group: promote-staging
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy staging
        env:
          GITHUB_SHA: ${{ steps.sha.outputs.short }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          deploy/deploy.sh staging

  mark-staging-passed:
    needs: promote
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag staging-passed
        env:
          SHA: ${{ needs.promote.outputs.sha }}
        run: |
          TAG="staging-passed/$SHA"
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged $TAG"
