name: Deploy test + E2E

# IDEAL CHANGE vs MVP:
# One workflow per phase. This is the "test env" phase: triggered by green
# CI on main, it deploys to the internal `test` env, runs sharded E2E
# against it, and on green tags `test-passed/<sha>` so the next phase
# (promote-staging) picks it up via push:tags trigger.
#
# Concurrency-grouped with cancel-in-progress so a newer sha cancels the
# older test deploy + e2e run. Phase boundary tag (`test-passed/*`) is
# pushed with CICD_PAT so promote-staging.yml's push:tags trigger fires
# (default GITHUB_TOKEN-pushed tags don't trigger workflows).

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-test-and-e2e
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy_test:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy
        env:
          GITHUB_SHA: ${{ steps.sha.outputs.short }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          deploy/deploy.sh test

  e2e:
    needs: deploy_test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      - name: E2E shard ${{ matrix.shard }}/4
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/4

  tag_test_passed:
    needs: [deploy_test, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          # PAT used so the tag push triggers promote-staging.yml.
          token: ${{ secrets.CICD_PAT }}

      - name: Tag test-passed
        env:
          SHA: ${{ needs.deploy_test.outputs.sha }}
        run: |
          TAG="test-passed/$SHA"
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged $TAG"
