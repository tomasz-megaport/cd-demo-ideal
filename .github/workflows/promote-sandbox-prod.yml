name: Promote to sandbox+prod

# IDEAL CHANGE vs MVP:
# Same shape as MVP cron-promote, but with finer demo cadence and dashboard
# integration. Reads newest `pre-prod-passed/<sha>` tag older than the soak
# window and deploys to **sandbox + prod in parallel** from the same image.
#
# Sandbox = customer-facing rehearsal env. It MIRRORS prod exactly — same
# image, same window. The dashboard's `/admin/releases` rollback button
# can fire this via repository_dispatch with action=force-promote
# (passcode-gated).
#
# Real cron: `0 22,6,14 * * *` UTC = 08:00 / 16:00 / 00:00 AEST (every 8h).
# Demo cron: `*/10 * * * *` for visibility while clicking through walkthrough.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip soak window'
        type: boolean
        default: false
  repository_dispatch:
    types: [force-promote]

concurrency:
  group: promote-sandbox-prod
  cancel-in-progress: false

jobs:
  pick:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pick: ${{ steps.pick.outputs.pick }}
      sha: ${{ steps.pick.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: pick
        env:
          FORCE: ${{ inputs.force || github.event_name == 'repository_dispatch' }}
        run: |
          set -euo pipefail
          MIN_AGE=300
          [[ "$FORCE" == 'true' ]] && MIN_AGE=0
          NOW="$(date +%s)"
          PICK=""
          PICK_SHA=""
          for TAG in $(git tag --list 'pre-prod-passed/*' --sort=-creatordate); do
            T="$(git log -1 --format=%ct "$TAG")"
            AGE=$((NOW - T))
            if [[ $AGE -ge $MIN_AGE ]]; then
              PICK="$TAG"
              PICK_SHA="${TAG#pre-prod-passed/}"
              break
            fi
          done
          if [[ -z "$PICK" ]]; then
            echo 'Nothing soaked enough to promote.'
            echo 'pick=' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "pick=$PICK" >> "$GITHUB_OUTPUT"
          echo "sha=$PICK_SHA" >> "$GITHUB_OUTPUT"
          echo "Promoting $PICK to sandbox+prod in parallel"

  deploy_sandbox:
    needs: pick
    if: ${{ needs.pick.outputs.pick != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - env:
          GITHUB_SHA: ${{ needs.pick.outputs.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout "${{ needs.pick.outputs.pick }}"
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          deploy/deploy.sh sandbox

  deploy_prod:
    needs: pick
    if: ${{ needs.pick.outputs.pick != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - env:
          GITHUB_SHA: ${{ needs.pick.outputs.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout "${{ needs.pick.outputs.pick }}"
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          deploy/deploy.sh prod
