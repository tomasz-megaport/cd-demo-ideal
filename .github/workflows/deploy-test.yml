name: Deploy test

# IDEAL CHANGE vs MVP:
# Pre-staging env named "test". Auto-deploys on every green main CI.
# Concurrency-grouped per app with cancel-in-progress: a newer sha cancels
# the in-flight test-env deploy and any e2e run racing against it. No
# customer exposure on tip-of-main.

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-test
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy
        env:
          GITHUB_SHA: ${{ steps.sha.outputs.short }}
        run: |
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          deploy/deploy.sh test
